<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abiolabs — Lab Management</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f7;color:#2c2c2a;min-height:100vh}
.app-header{background:linear-gradient(135deg,#1a1060 0%,#3C3489 40%,#534AB7 70%,#185FA5 100%);padding:0;display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(30,20,100,0.4)}
.app-header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:12px 24px;border-bottom:1px solid rgba(255,255,255,0.1)}
.app-brand{display:flex;align-items:center;gap:0}
.logo-box{background:#fff;border-radius:10px;padding:5px 10px;display:flex;align-items:center;justify-content:center;height:46px}
.logo-box img{height:36px;object-fit:contain}
.app-brand-text{display:flex;flex-direction:column;margin-left:14px}
.app-brand-name{color:#fff;font-size:16px;font-weight:700;letter-spacing:0.3px}
.app-sub{color:rgba(255,255,255,0.65);font-size:11px;font-weight:400}
.app-header-bottom{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 24px}
.tab-nav{display:flex;gap:6px}
.tab-btn{padding:9px 22px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;border:none;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);transition:all .2s;display:flex;align-items:center;gap:6px;border-bottom:3px solid transparent}
.tab-btn:hover{background:rgba(255,255,255,0.2);color:#fff}
.tab-btn.active{background:rgba(255,255,255,0.2);color:#fff;border-bottom:3px solid #fff}
.save-area{display:flex;align-items:center;gap:10px}
#saveBtn{background:linear-gradient(135deg,#1D4ED8,#3B82F6);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 3px 10px rgba(29,78,216,0.35);transition:all .2s;letter-spacing:0.3px}
#saveBtn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(29,78,216,0.45);background:linear-gradient(135deg,#1e40af,#1D4ED8)}
#saveBtn:disabled{opacity:0.6;transform:none}
.page{display:none;padding:1.5rem}
.page.active{display:block}
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #d3d1c7;border-radius:8px;margin-bottom:1.25rem;font-size:12px;color:#5f5e5a;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#d3d1c7;flex-shrink:0}
.sync-dot.ok{background:#0F6E56}
.sync-dot.syncing{background:#854F0B;animation:pulse 1s infinite}
.sync-dot.err{background:#993C1D}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stats6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:1.25rem}
@media(max-width:700px){.stats,.stats6{grid-template-columns:repeat(2,1fr)}}
.sc{background:#fff;border:1px solid #d3d1c7;border-radius:10px;padding:.75rem 1rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.sl{font-size:11px;color:#888780;margin-bottom:4px}
.sv{font-size:20px;font-weight:600;color:#2c2c2a}
.sv.blue{color:#185FA5}.sv.green{color:#0F6E56}.sv.amber{color:#854F0B}.sv.red{color:#993C1D}
/* ── CALENDAR ── */
.cal-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.vtoggle{display:flex;border:1px solid #d3d1c7;border-radius:8px;overflow:hidden}
.vbtn{padding:6px 14px;font-size:13px;cursor:pointer;background:transparent;border:none;color:#888780}
.vbtn.active{background:#f1efe8;color:#2c2c2a;font-weight:500}
.nav-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.nbtn{background:#fff;border:1px solid #d3d1c7;border-radius:8px;padding:6px 13px;cursor:pointer;color:#5f5e5a}
.nbtn:hover{background:#f1efe8}
.period{font-size:15px;font-weight:600;color:#2c2c2a;min-width:180px;text-align:center}
.outer{overflow-x:auto;border:1px solid #d3d1c7;border-radius:12px}
table.cal{border-collapse:collapse;table-layout:fixed}
th.nhd{background:#f5f4f0;font-size:11px;font-weight:600;color:#888780;padding:0 8px;height:30px;border-bottom:1px solid #d3d1c7;border-right:1px solid #d3d1c7;text-align:left;vertical-align:middle;white-space:nowrap}
th.shd{height:30px;background:#f5f4f0;border-bottom:1px solid #d3d1c7;border-right:1px solid #eee;vertical-align:bottom;padding:0;position:relative}
th.shd.hr{border-right:1px solid #d3d1c7}
th.shd span{position:absolute;bottom:4px;left:2px;font-size:9px;color:#888780;white-space:nowrap;line-height:1}
th.shd.hr span{font-size:10px;font-weight:600;color:#2c2c2a}
td.nc{background:#fff;border-right:1px solid #d3d1c7;border-bottom:1px solid #d3d1c7;padding:6px 8px;vertical-align:middle}
tr:last-child td{border-bottom:none}
td.sc2{height:46px;border-right:1px solid #eee;border-bottom:1px solid #d3d1c7;background:#fff;cursor:pointer;vertical-align:top;padding:0}
td.sc2:hover{background:#f9f8f5}
td.sc2.hr{border-right:1px solid #d3d1c7}
.blk{position:absolute;border-radius:4px;padding:2px 5px;font-size:10px;font-weight:600;display:flex;align-items:center;gap:3px;overflow:hidden;cursor:pointer;border:1px solid transparent;z-index:3;pointer-events:auto}
.blk.done{opacity:.45;text-decoration:line-through}
.blk .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.blk .t2{font-size:8px;opacity:.7;flex-shrink:0;white-space:nowrap}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rev{margin-top:1.25rem;border:1px solid #d3d1c7;border-radius:12px;overflow:hidden}
.rev-hd{padding:10px 14px;background:#f5f4f0;border-bottom:1px solid #d3d1c7;font-size:13px;font-weight:600;color:#2c2c2a;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.rev-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #d3d1c7;background:#fff}
.rev-row:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid #d3d1c7;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;padding:0}
.chk.done{background:#0F6E56;border-color:#0F6E56;color:#fff}
/* ── REGISTRY ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.search-box{flex:1;min-width:180px;padding:8px 12px;border:1px solid #d3d1c7;border-radius:8px;font-size:13px;background:#fff;color:#2c2c2a;outline:none}
.search-box:focus{border-color:#534AB7}
.fsel{padding:8px 10px;border:1px solid #d3d1c7;border-radius:8px;font-size:13px;background:#fff;color:#2c2c2a;outline:none}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#534AB7,#3C3489);color:#fff;box-shadow:0 3px 10px rgba(83,74,183,0.3)}.btn-primary:hover{background:linear-gradient(135deg,#3C3489,#2d2568);box-shadow:0 5px 15px rgba(83,74,183,0.4);transform:translateY(-1px)}
.tbl-wrap{background:#fff;border:1px solid #d3d1c7;border-radius:12px;overflow:hidden;overflow-x:auto}
table.reg{width:100%;border-collapse:collapse;min-width:1000px}
table.reg thead th{background:#f5f4f0;padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:#888780;border-bottom:1px solid #d3d1c7;white-space:nowrap}
table.reg tbody tr{border-bottom:1px solid #f1efe8;transition:background .1s}
table.reg tbody tr:last-child{border-bottom:none}
table.reg tbody tr:hover{background:#fafaf8}
table.reg tbody td{padding:10px 12px;font-size:13px;color:#2c2c2a;vertical-align:middle}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-received{background:#DBEAFE;color:#1D4ED8;border:1px solid #93C5FD}
.b-testing{background:#FEF3C7;color:#B45309;border:1px solid #FCD34D}
.b-completed{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7}
.b-report{background:#EDE9FE;color:#5B21B6;border:1px solid #C4B5FD}
.b-invoice{background:#FCE7F3;color:#9D174D;border:1px solid #F9A8D4}
.abtn{background:none;border:1px solid #d3d1c7;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:#5f5e5a;white-space:nowrap}
.abtn:hover{background:#f1efe8}
.abtn.assign{background:#EEEDFE;border-color:#AFA9EC;color:#534AB7}
.abtn.assign:hover{background:#534AB7;color:#fff}
.empty-row td{padding:2rem;text-align:center;color:#888780;font-size:13px}
/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;border:1px solid #d3d1c7;padding:1.5rem;width:540px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;color:#2c2c2a;margin-bottom:1.1rem;display:flex;align-items:center;gap:8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg.full{grid-template-columns:1fr}
.field label{display:block;font-size:11px;font-weight:600;color:#5f5e5a;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#2c2c2a;outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,.1)}
.field textarea{resize:vertical;min-height:56px}
.shd2{font-size:11px;font-weight:600;color:#534AB7;text-transform:uppercase;letter-spacing:.5px;margin:1rem 0 .5rem;padding-bottom:.5rem;border-bottom:1px solid #eee}
.ma{display:flex;gap:8px;margin-top:1.1rem;justify-content:flex-end;flex-wrap:wrap}
.bp{background:#534AB7;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer}.bp:hover{background:#3C3489}
.bc{background:#fff;border:1px solid #d3d1c7;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;color:#5f5e5a}.bc:hover{background:#f1efe8}
.bd{background:#fff;border:1px solid #F0997B;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;color:#993C1D}.bd:hover{background:#FAECE7}
</style>
</head>

      <option>Food testing</option><option>Environmental</option><option>Medical Device</option>
      <option>VET</option><option>Blood</option><option>Urine</option>
      <option>Soil</option><option>Air</option><option>Other</option>

  </div>
  <div class="tbl-wrap">

        <th>Sample ID</th><th>Client</th><th>Test Type</th><th>Matrix</th><th>Qty</th>
        <th>Received</th><th>Test Start</th><th>Test End</th><th>Report Sent</th>
        <th>Assigned To</th><th>Status</th><th>Actions</th>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbyTt6baEnyGlJf0XMzXGuaBJR40W01aPbASzgufRrSTN-JOTMl2Zal1-HasjEmrI3OXMg/exec';
const SC=[{c:'#534AB7',bg:'#EEEDFE',bd:'#AFA9EC'},{c:'#185FA5',bg:'#E6F1FB',bd:'#85B7EB'},{c:'#0F6E56',bg:'#E1F5EE',bd:'#5DCAA5'},{c:'#993C1D',bg:'#FAECE7',bd:'#F0997B'},{c:'#854F0B',bg:'#FAEEDA',bd:'#EF9F27'},{c:'#72243E',bg:'#FBEAF0',bd:'#ED93B1'},{c:'#3B6D11',bg:'#EAF3DE',bd:'#97C459'},{c:'#5F5E5A',bg:'#F1EFE8',bd:'#B4B2A9'}];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const SH=7,EH=18,DMINS=(EH-SH)*60,SLOT=30,SCOLS=DMINS/SLOT,SW=36,NW=114;
const TEST_TYPES=[];
const STATUSES=['Sample received','Test in progress','Test completed','Report sent','Invoice done & forwarded'];
const SBADGE={'Sample received':'b-received','Test in progress':'b-testing','Test completed':'b-completed','Report sent':'b-report','Invoice done & forwarded':'b-invoice'};

// ── STATE ─────────────────────────────────────────────────────────────────
let staff=[],taskStore={},compStore={},recurStore=[],samples=[];
let nextTid=1,nextRid=1,view='daily',offset=0;
const today=new Date();

// ── TAB SWITCH ─────────────────────────────────────────────────────────────
function switchTab(tab,el){el=el||document.querySelector('.tab-btn.active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  el.classList.add('active');
  currentTab=tab;
}

let currentTab='calendar';

// ── MANUAL SAVE ──────────────────────────────────────────────────────────
async function manualSave(){
  const btn=document.getElementById('saveBtn');
  const status=document.getElementById('saveStatus');
  btn.disabled=true;
  btn.innerHTML='&#x23F3; Saving…';
  btn.style.opacity='0.7';
  status.textContent='';
  try{
    await saveTasks();
    await saveSamples();
    status.innerHTML='<span style="color:#A7F3D0">&#x2713; Saved & synced '+new Date().toLocaleTimeString()+'</span>';
    setTimeout(()=>{status.textContent='';},5000);
  }catch(e){
    status.innerHTML='<span style="color:#FCA5A5">&#x2715; Save failed</span>';
  }
  btn.disabled=false;
  btn.innerHTML='&#128190; Save &amp; Sync';
  btn.style.opacity='1';
}

// ── SYNC ───────────────────────────────────────────────────────────────────
function setSyncStatus(state,msg){
  document.getElementById('syncDot').className='sync-dot'+{ok:' ok',syncing:' syncing',err:' err'}[state];
  document.getElementById('syncMsg').textContent=msg;
}

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    const timer=setTimeout(()=>{try{document.head.removeChild(script);}catch(e){}delete window[cb];reject(new Error('timeout'));},15000);
    window[cb]=function(data){clearTimeout(timer);try{document.head.removeChild(script);}catch(e){}delete window[cb];resolve(data);};
    script.onerror=function(){clearTimeout(timer);try{document.head.removeChild(script);}catch(e){}delete window[cb];reject(new Error('error'));};
    script.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&t='+Date.now();
    document.head.appendChild(script);
  });
}

async function loadAll(){
  setSyncStatus('syncing','Loading data…');
  try{
    const json=await jsonp(API_URL+'?action=readAll');
    if(json.staff&&json.staff.length>0){
      staff=json.staff.map(s=>({id:parseInt(s.Id||s.id)||0,name:String(s.Name||s.name||''),role:String(s.Role||s.role||''),ci:parseInt(s.ColorIndex||s.ci)||0}));
      updateFilter();
    }
    if(json.data!==undefined){
      taskStore={};compStore={};recurStore=[];nextTid=1;nextRid=1;
      json.data.forEach(row=>{
        if(!row.Id||!row.TaskLabel)return;
        const sid=parseInt(row.StaffId),day=row.DayKey;
        const isRec=String(row.IsRecurring).toUpperCase()==='TRUE';
        const done=String(row.IsDone).toUpperCase()==='TRUE';
        if(isRec){
          recurStore.push({id:row.Id,sid,label:row.TaskLabel,sm:parseInt(row.StartTime),em:parseInt(row.EndTime),days:row.RecurDays||'daily'});
          const n=parseInt(String(row.Id).replace('r',''))||0;if(n>=nextRid)nextRid=n+1;
        } else {
          const k=tk(sid,day);if(!taskStore[k])taskStore[k]=[];
          taskStore[k].push({id:row.Id,label:row.TaskLabel,sm:parseInt(row.StartTime),em:parseInt(row.EndTime)});
          if(done)compStore[ck(sid,day,row.Id)]=true;
          const n=parseInt(String(row.Id).replace('t',''))||0;if(n>=nextTid)nextTid=n+1;
        }
      });
    }
    if(json.samples!==undefined){
      samples=json.samples.map(s=>({
        id:s.Id||'',client:s.Client||'',testType:s.TestType||'',matrix:s.Matrix||'',
        quantity:s.Quantity||'',receptionDate:s.ReceptionDate||'',testStartDate:s.TestStartDate||'',
        testEndDate:s.TestEndDate||'',reportSentDate:s.ReportSentDate||'',
        assignedTo:s.AssignedTo||'',status:s.Status||'Pending reception',
        notes:s.Notes||'',priority:s.Priority||'Normal',rowId:s.RowId||''
      }));
    }
    setSyncStatus('ok','Live — synced '+new Date().toLocaleTimeString());
  }catch(e){setSyncStatus('err','Could not connect.');}
  renderCal();renderReg();renderRegStats();
}

// ── HELPERS ────────────────────────────────────────────────────────────────
const sc=s=>SC[s.ci%SC.length];
const ini=n=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const isToday=d=>{const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear();};
function setView(v){view=v;document.getElementById('btn-daily').classList.toggle('active',v==='daily');document.getElementById('btn-weekly').classList.toggle('active',v==='weekly');renderCal();}
function navigate(d){offset+=d;renderCal();}
function goToday(){offset=0;renderCal();}
function getDate(){const d=new Date(today);if(view==='daily')d.setDate(d.getDate()+offset);else{const day=d.getDay()||7;d.setDate(d.getDate()-day+1+offset*7);}return d;}
function fmt(d){return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function getDK(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayName(d){return DAYS[(d.getDay()+6)%7];}
function filteredStaff(){const f=document.getElementById('staffFilter').value;return f==='all'?staff:staff.filter(s=>s.id==f);}
function updateFilter(){const sel=document.getElementById('staffFilter'),cur=sel.value;sel.innerHTML='<option value="all">All staff</option>'+staff.map(s=>`<option value="${s.id}"${s.id==cur?' selected':''}>${s.name}</option>`).join('');}
function parseT(v){if(!v&&v!==0)return null;v=String(v).trim().toLowerCase().replace(/[h.]/g,':');if(/^\d{1,2}$/.test(v))v+=':00';const p=v.split(':');const h=parseInt(p[0]||0),m=parseInt(p[1]||0);if(isNaN(h)||isNaN(m))return null;return Math.max(SH*60,Math.min(EH*60,h*60+m));}
function fmtT(m){const h=Math.floor(m/60),mm=m%60;return `${String(h).padStart(2,'0')}h${String(mm).padStart(2,'0')}`;}
function slotOf(m){return Math.floor((m-SH*60)/SLOT);}
function tk(sid,d){return `${sid}|${d}`;}
function getT(sid,d){return taskStore[tk(sid,d)]||[];}
function setT(sid,d,a){taskStore[tk(sid,d)]=a;}
function getRec(sid,dk){const p=dk.split('-');const dn=DAYS[(new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])).getDay()+6)%7];return recurStore.filter(r=>r.sid===sid&&(r.days==='daily'||r.days.split(',').includes(dn)));}
function allT(sid,d){return [...getT(sid,d),...getRec(sid,d).map(r=>({id:'R'+r.id,label:r.label,sm:r.sm,em:r.em,isRec:true,rid:r.id}))];}
function ck(sid,d,tid){return `${sid}|${d}|${tid}`;}
function isDone(sid,d,tid){return !!compStore[ck(sid,d,tid)];}
function toggleDone(sid,d,tid){compStore[ck(sid,d,tid)]=!compStore[ck(sid,d,tid)];saveTasks();renderCal();}
function fmtDate(d){if(!d||d==='')return '<span style="color:#d3d1c7">—</span>';try{const dt=new Date(d);if(isNaN(dt.getTime()))return d;return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;}}

// ── CALENDAR RENDER ────────────────────────────────────────────────────────
function renderCal(){
  updateFilter();
  const d=getDate(),sl=filteredStaff();
  const d0=getDate();
  const days=view==='daily'?[getDK(d0)]:(()=>{const a=[];for(let i=0;i<7;i++){const x=new Date(d0);x.setDate(x.getDate()+i);a.push(getDK(x));}return a;})();
  let total=0,done=0,hrs=0;
  sl.forEach(s=>days.forEach(dk=>{allT(s.id,dk).forEach(t=>{total++;if(isDone(s.id,dk,t.id))done++;hrs+=(t.em-t.sm)/60;});}));
  document.getElementById('calStats').innerHTML=`
    <div class="sc"><div class="sl">Staff</div><div class="sv">${sl.length}</div></div>
    <div class="sc"><div class="sl">Tasks</div><div class="sv">${total}</div></div>
    <div class="sc"><div class="sl">Completed</div><div class="sv green">${done}/${total}</div></div>
    <div class="sc"><div class="sl">Hours</div><div class="sv">${hrs.toFixed(1)}h</div></div>`;
  if(view==='daily'){
    document.getElementById('periodLabel').innerHTML=fmt(d)+(isToday(d)?' <span style="background:#EEEDFE;color:#534AB7;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px">Today</span>':'');
    renderDailyTable(d,sl);renderReview(sl);
  } else {
    const e=new Date(d);e.setDate(d.getDate()+6);
    document.getElementById('periodLabel').textContent=fmt(d)+' – '+fmt(e);
    renderWeekly(d,sl);
    document.getElementById('reviewDiv').innerHTML='';
  }
}

function renderDailyTable(date,sl){
  const day=getDK(date),totalW=NW+SCOLS*SW;
  let h=`<div class="outer"><div style="position:relative;min-width:${totalW}px"><table class="cal" style="width:${totalW}px;min-width:${totalW}px"><thead><tr>`;
  h+=`<th class="nhd" style="width:${NW}px;min-width:${NW}px">${fmt(date)}</th>`;
  for(let i=0;i<SCOLS;i++){const mins=SH*60+i*SLOT,isHr=i%2===0;h+=`<th class="shd${isHr?' hr':''}" style="width:${SW}px;min-width:${SW}px"><span>${isHr?fmtT(mins):''}</span></th>`;}
  h+=`</tr></thead><tbody>`;
  let blks='';
  sl.forEach((s,ri)=>{
    const c=sc(s);
    h+=`<tr><td class="nc" style="width:${NW}px;min-width:${NW}px"><div style="display:flex;align-items:center;gap:6px"><div class="av" style="background:${c.bg};color:${c.c}">${ini(s.name)}</div><div><div style="font-size:11px;font-weight:600">${s.name}</div><div style="font-size:9px;color:#888780">${s.role}</div></div></div></td>`;
    for(let i=0;i<SCOLS;i++)h+=`<td class="sc2${i%2===0?' hr':''}" style="width:${SW}px;min-width:${SW}px" onclick="openAdd(${s.id},'${day}',${i})"></td>`;
    h+=`</tr>`;
    allT(s.id,day).forEach(t=>{
      const si=slotOf(t.sm),ei=slotOf(t.em),left=NW+si*SW+1,width=Math.max((ei-si)*SW-2,10);
      const done=isDone(s.id,day,t.id);const safeId=String(t.id).replace(/'/g,"\\'");
      blks+=`<div class="blk${done?' done':''}" data-ri="${ri}" style="left:${left}px;width:${width}px;background:${c.bg};color:${c.c};border-color:${c.bd}" onclick="openEdit(${s.id},'${day}','${safeId}')">
        ${t.isRec?'&#x21BA;&nbsp;':''}${done?'&#x2713;&nbsp;':''}<span class="lbl">${t.label}</span><span class="t2">${fmtT(t.sm)}</span></div>`;
    });
  });
  h+=`</tbody></table><div id="blkL" style="position:absolute;top:30px;left:0;pointer-events:none;width:${totalW}px">${blks}</div></div></div>`;
  document.getElementById('calView').innerHTML=h;
  requestAnimationFrame(()=>{
    const rows=document.querySelectorAll('table.cal tbody tr'),layer=document.getElementById('blkL');
    if(!layer||!rows.length)return;
    let top=0;
    rows.forEach((row,ri)=>{
      const rh=row.offsetHeight||46;
      layer.querySelectorAll(`.blk[data-ri="${ri}"]`).forEach(b=>{b.style.top=(top+3)+'px';b.style.height=(rh-6)+'px';b.style.pointerEvents='auto';});
      top+=rh;
    });
  });
}

function renderWeekly(startDate,sl){
  const tw=NW+DAYS.length*130;
  const wDates=[];for(let i=0;i<7;i++){const x=new Date(startDate);x.setDate(x.getDate()+i);wDates.push(x);}
  let h=`<div class="outer"><table style="border-collapse:collapse;min-width:${tw}px;width:100%"><thead><tr>`;
  h+=`<th style="width:${NW}px;min-width:${NW}px;background:#f5f4f0;border-bottom:1px solid #d3d1c7;border-right:1px solid #d3d1c7;padding:0 8px;height:30px;font-size:11px;font-weight:600;color:#888780;text-align:left;vertical-align:middle">Staff</th>`;
  wDates.forEach(dd=>{h+=`<th style="background:#f5f4f0;border-bottom:1px solid #d3d1c7;border-right:1px solid #eee;padding:0 8px;height:30px;font-size:11px;font-weight:600;color:#2c2c2a;text-align:left;vertical-align:middle">${DAYS[(dd.getDay()+6)%7]} ${dd.getDate()}${isToday(dd)?' <span style="background:#EEEDFE;color:#534AB7;font-size:9px;padding:1px 4px;border-radius:3px">today</span>':''}</th>`;});
  h+=`</tr></thead><tbody>`;
  sl.forEach(s=>{
    const c=sc(s);
    h+=`<tr><td style="width:${NW}px;min-width:${NW}px;padding:8px;border-right:1px solid #d3d1c7;border-bottom:1px solid #d3d1c7;vertical-align:middle;background:#fff"><div style="display:flex;align-items:center;gap:6px"><div class="av" style="background:${c.bg};color:${c.c}">${ini(s.name)}</div><div><div style="font-size:11px;font-weight:600">${s.name}</div><div style="font-size:9px;color:#888780">${s.role}</div></div></div></td>`;
    wDates.forEach(dd=>{
      const dk=getDK(dd);const ts=allT(s.id,dk);
      h+=`<td style="border-right:1px solid #eee;border-bottom:1px solid #d3d1c7;padding:5px;vertical-align:top;min-height:46px;background:#fff;cursor:pointer;min-width:120px" onclick="openAdd(${s.id},'${dk}',null)">`;
      ts.forEach(t=>{const done=isDone(s.id,dk,t.id);const safeId=String(t.id).replace(/'/g,"\\'");
        h+=`<div style="border-radius:3px;padding:2px 5px;font-size:10px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:3px;background:${c.bg};color:${c.c};border:1px solid ${c.bd};${done?'opacity:.45;text-decoration:line-through':''}cursor:pointer" onclick="event.stopPropagation();openEdit(${s.id},'${dk}','${safeId}')">${t.isRec?'&#x21BA;&nbsp;':''}${done?'&#x2713;&nbsp;':''}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${t.label}</span><span style="font-size:8px;opacity:.7">${fmtT(t.sm)}</span></div>`;});
      h+=`<div style="font-size:10px;color:#aaa;margin-top:2px">+ add</div></td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  document.getElementById('calView').innerHTML=h;
}

function renderReview(sl){
  const day=getDK(getDate());let all=[];
  sl.forEach(s=>allT(s.id,day).forEach(t=>all.push({s,t,done:isDone(s.id,day,t.id)})));
  const dn=all.filter(x=>x.done).length;
  const pct=all.length?Math.round(dn/all.length*100):0;
  const barCol=pct===100?'#0F6E56':pct>=50?'#854F0B':'#534AB7';
  let h=`<div class="rev"><div class="rev-hd"><span>&#x2713; Daily review — ${fmt(getDate())}</span><span style="font-size:12px;font-weight:400;color:#888780">${dn}/${all.length} completed · ${pct}%</span></div>`;
  h+=`<div style="height:5px;background:#eee"><div style="height:5px;width:${pct}%;background:${barCol};transition:width .4s"></div></div>`;
  if(!all.length){h+=`<div style="padding:1.25rem;text-align:center;color:#888780;font-size:13px">No tasks today. Click any time slot to add one.</div>`;}
  else{all.forEach(({s,t,done})=>{const c=sc(s);const safeId=String(t.id).replace(/'/g,"\\'");
    h+=`<div class="rev-row"><button class="chk${done?' done':''}" onclick="toggleDone(${s.id},'${day}','${safeId}')">${done?'&#x2713;':''}</button><div class="av" style="background:${c.bg};color:${c.c};width:22px;height:22px;font-size:9px">${ini(s.name)}</div><div style="flex:1;min-width:0"><div style="font-size:13px;${done?'text-decoration:line-through;opacity:.5':''};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.label}</div><div style="font-size:11px;color:#888780">${s.name} · ${fmtT(t.sm)}–${fmtT(t.em)}${t.isRec?' · &#x21BA;':''}</div></div><span style="font-size:11px;font-weight:600;color:${done?'#0F6E56':'#888780'};flex-shrink:0;margin-left:8px">${done?'&#x2713; Done':'Pending'}</span></div>`;});}
  h+=`</div>`;document.getElementById('reviewDiv').innerHTML=h;
}

// ── CALENDAR SAVE ──────────────────────────────────────────────────────────
async function saveTasks(){
  setSyncStatus('syncing','Saving…');
  const rows=[];
  Object.keys(taskStore).forEach(key=>{
    (taskStore[key]||[]).forEach(t=>{
      const parts=key.split('|');const sid=parts[0],day=parts[1];
      const done=compStore[ck(sid,day,t.id)]?'TRUE':'FALSE';
      rows.push({Id:t.id,StaffId:sid,StaffName:(staff.find(s=>s.id==sid)||{name:''}).name,DayKey:day,TaskLabel:t.label,StartTime:t.sm,EndTime:t.em,IsRecurring:'FALSE',RecurDays:'',IsDone:done});
    });
  });
  recurStore.forEach(r=>{rows.push({Id:r.id,StaffId:r.sid,StaffName:(staff.find(s=>s.id==r.sid)||{name:''}).name,DayKey:'',TaskLabel:r.label,StartTime:r.sm,EndTime:r.em,IsRecurring:'TRUE',RecurDays:r.days,IsDone:'FALSE'});});
  await postData({rows},'write');
}

async function saveSamples(){
  setSyncStatus('syncing','Saving…');
  const payload={samples:samples.map(s=>({Id:s.id,Client:s.client,TestType:s.testType,Matrix:s.matrix,Quantity:s.quantity,ReceptionDate:s.receptionDate,TestStartDate:s.testStartDate,TestEndDate:s.testEndDate,ReportSentDate:s.reportSentDate,AssignedTo:s.assignedTo,Status:s.status,Notes:s.notes,Priority:s.priority,RowId:s.rowId}))};
  await postData(payload,'writeSamples');
}

function postData(payload,action){
  return new Promise((resolve)=>{
    try{
      const cb='gsave_'+Date.now();
      const iframe=document.createElement('iframe');
      iframe.name=cb;iframe.style.display='none';document.body.appendChild(iframe);
      const form=document.createElement('form');
      form.method='POST';form.action=API_URL+'?action='+action+'&callback='+cb;
      form.target=cb;form.style.display='none';
      const input=document.createElement('input');
      input.type='hidden';input.name='data';input.value=JSON.stringify(payload);
      form.appendChild(input);document.body.appendChild(form);
      const timer=setTimeout(()=>{try{document.body.removeChild(iframe);document.body.removeChild(form);}catch(e){}setSyncStatus('ok','Saved ✓');resolve();},8000);
      iframe.onload=function(){clearTimeout(timer);try{document.body.removeChild(iframe);document.body.removeChild(form);}catch(e){}setSyncStatus('ok','Saved ✓ — '+new Date().toLocaleTimeString());resolve();};
      form.submit();
    }catch(err){setSyncStatus('err','Save error.');resolve();}
  });
}

// ── CALENDAR MODALS ────────────────────────────────────────────────────────
function openModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modalOverlay').classList.add('open');setTimeout(()=>{const el=document.querySelector('#modalBox input');if(el)el.focus();},80);}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function recOpts(){return`<option value="none">One-time only</option><option value="daily">Every day</option><option value="Mon,Tue,Wed,Thu,Fri">Weekdays</option><option value="Mon">Every Monday</option><option value="Tue">Every Tuesday</option><option value="Wed">Every Wednesday</option><option value="Thu">Every Thursday</option><option value="Fri">Every Friday</option><option value="Sat,Sun">Weekends</option>`;}

function openAdd(sid,day,slotIdx){
  const s=staff.find(x=>x.id===sid),c=sc(s);
  const sugSm=slotIdx!=null?SH*60+slotIdx*SLOT:SH*60+60;const sugEm=Math.min(sugSm+60,EH*60);
  openModal(`<h3><div class="av" style="background:${c.bg};color:${c.c};width:22px;height:22px;font-size:9px">${ini(s.name)}</div>${s.name} · ${day}</h3>
    <div class="fg"><div class="field"><label>Task name</label><input id="m-lbl" placeholder="e.g. DNA extraction"></div><div class="field"><label>Recurring</label><select id="m-rec">${recOpts()}</select></div></div>
    <div class="fg"><div class="field"><label>Start (e.g. 08h30)</label><input id="m-sm" value="${fmtT(sugSm)}"></div><div class="field"><label>End (e.g. 10h00)</label><input id="m-em" value="${fmtT(sugEm)}"></div></div>
    <div class="ma"><button class="bc" onclick="closeModal()">Cancel</button><button class="bp" onclick="doAdd(${sid},'${day}')">Add task</button></div>`);
}

function markUnsaved(){document.getElementById('saveStatus').innerHTML='<span style="color:rgba(255,220,100,0.9)">&#x26A0; Unsaved changes — click Save &amp; Sync</span>';}

function doAdd(sid,day){
  const lbl=document.getElementById('m-lbl').value.trim();
  const sm=parseT(document.getElementById('m-sm').value);const em=parseT(document.getElementById('m-em').value);
  const rec=document.getElementById('m-rec').value;
  if(!lbl){alert('Enter a task name.');return;}
  if(sm===null||em===null||em<=sm){alert('Enter valid start and end times.');return;}
  if(rec==='none'){setT(sid,day,[...getT(sid,day),{id:'t'+nextTid++,label:lbl,sm,em}]);}
  else{recurStore.push({id:'r'+nextRid++,sid,label:lbl,sm,em,days:rec});}
  closeModal();renderCal();
}

function openEdit(sid,day,tid){
  const s=staff.find(x=>x.id===sid),c=sc(s);const isRec=String(tid).startsWith('R');
  let t,ro;
  if(isRec){ro=recurStore.find(r=>'R'+r.id===tid);if(!ro)return;t={label:ro.label,sm:ro.sm,em:ro.em};}
  else{t=getT(sid,day).find(x=>x.id===tid);if(!t)return;}
  const done=isDone(sid,day,tid);const safeId=String(tid).replace(/'/g,"\\'");
  openModal(`<h3><div class="av" style="background:${c.bg};color:${c.c};width:22px;height:22px;font-size:9px">${ini(s.name)}</div>${s.name}${isRec?' · ↺ Recurring':''}</h3>
    <div class="fg"><div class="field"><label>Task name</label><input id="m-lbl" value="${t.label}"></div><div class="field"><label>Status</label><select id="m-status"><option value="pending"${!done?' selected':''}>Pending</option><option value="done"${done?' selected':''}>Completed ✓</option></select></div></div>
    <div class="fg"><div class="field"><label>Start</label><input id="m-sm" value="${fmtT(t.sm)}"></div><div class="field"><label>End</label><input id="m-em" value="${fmtT(t.em)}"></div></div>
    <div class="ma"><button class="bd" onclick="${isRec?`delRec('${ro.id}')`:`delTask(${sid},'${day}','${safeId}')`}">Delete</button><button class="bc" onclick="closeModal()">Cancel</button><button class="bp" onclick="${isRec?`saveRec('${ro.id}','${sid}','${day}','${safeId}')`:`saveTask(${sid},'${day}','${safeId}')`}">Save</button></div>`);
}

function saveTask(sid,day,tid){
  const arr=getT(sid,day),t=arr.find(x=>x.id===tid);
  if(t){const lbl=document.getElementById('m-lbl').value.trim();const sm=parseT(document.getElementById('m-sm').value);const em=parseT(document.getElementById('m-em').value);if(lbl)t.label=lbl;if(sm!==null)t.sm=sm;if(em!==null&&em>t.sm)t.em=em;}
  compStore[ck(sid,day,tid)]=(document.getElementById('m-status').value==='done');
  setT(sid,day,arr);markUnsaved();closeModal();renderCal();
}
function saveRec(rid,sid,day,tid){
  const r=recurStore.find(x=>x.id===rid);
  if(r){const lbl=document.getElementById('m-lbl').value.trim();const sm=parseT(document.getElementById('m-sm').value);const em=parseT(document.getElementById('m-em').value);if(lbl)r.label=lbl;if(sm!==null)r.sm=sm;if(em!==null&&em>r.sm)r.em=em;}
  compStore[ck(sid,day,tid)]=(document.getElementById('m-status').value==='done');
  closeModal();renderCal();
}
function delTask(sid,day,tid){if(!confirm('Delete this task?'))return;setT(sid,day,getT(sid,day).filter(x=>x.id!==tid));markUnsaved();closeModal();renderCal();}
function delRec(rid){if(!confirm('Delete recurring task from all days?'))return;recurStore=recurStore.filter(r=>r.id!==rid);markUnsaved();closeModal();renderCal();}

// ── REGISTRY RENDER ────────────────────────────────────────────────────────
function renderRegStats(){
  const total=samples.length;
  const received=samples.filter(s=>s.status==='Sample received').length;
  const testing=samples.filter(s=>s.status==='Test in progress').length;
  const completed=samples.filter(s=>s.status==='Test completed').length;
  const report=samples.filter(s=>s.status==='Report sent').length;
  const invoice=samples.filter(s=>s.status==='Invoice done & forwarded').length;
  document.getElementById('regStats').innerHTML=`
    <div class="sc" style="border-left:4px solid #3B82F6"><div class="sl">Total samples</div><div class="sv">${total}</div></div>
    <div class="sc" style="border-left:4px solid #1D4ED8"><div class="sl">Sample received</div><div class="sv blue">${received}</div></div>
    <div class="sc" style="border-left:4px solid #B45309"><div class="sl">Test in progress</div><div class="sv amber">${testing}</div></div>
    <div class="sc" style="border-left:4px solid #065F46"><div class="sl">Test completed</div><div class="sv green">${completed}</div></div>
    <div class="sc" style="border-left:4px solid #5B21B6"><div class="sl">Report sent</div><div class="sv" style="color:#5B21B6">${report}</div></div>
    <div class="sc" style="border-left:4px solid #9D174D"><div class="sl">Invoice forwarded</div><div class="sv" style="color:#9D174D">${invoice}</div></div>`;
}

function renderReg(){
  renderRegStats();
  const search=document.getElementById('regSearch').value.toLowerCase();
  const fStatus=document.getElementById('regStatus').value;
  const fTest=document.getElementById('regTest').value;
  const filtered=samples.filter(s=>{
    const ms=!search||[s.id,s.client,s.testType,s.matrix,s.assignedTo].some(v=>v.toLowerCase().includes(search));
    const mst=!fStatus||s.status===fStatus;
    const mt=!fTest||s.testType===fTest;
    return ms&&mst&&mt;
  });
  const tbody=document.getElementById('regBody');
  if(!filtered.length){tbody.innerHTML=`<tr class="empty-row"><td colspan="12">No samples found. Click "+ New sample" to add one.</td></tr>`;return;}
  tbody.innerHTML=filtered.map(s=>{
    const badge=SBADGE[s.status]||'b-pending';
    const priColor=s.priority==='High'?'color:#993C1D':s.priority==='Medium'?'color:#854F0B':'';
    return `<tr>
      <td><strong style="${priColor}">${s.id||'—'}</strong>${s.priority==='High'?' <span title="High priority" style="color:#993C1D">⚠</span>':''}</td>
      <td>${s.client||'—'}</td><td>${s.testType||'—'}</td><td>${s.matrix||'—'}</td>
      <td style="text-align:center">${s.quantity||'—'}</td>
      <td>${fmtDate(s.receptionDate)}</td><td>${fmtDate(s.testStartDate)}</td>
      <td>${fmtDate(s.testEndDate)}</td><td>${fmtDate(s.reportSentDate)}</td>
      <td>${s.assignedTo?`<span style="color:#534AB7;font-weight:500">${s.assignedTo}</span>`:'<span style="color:#d3d1c7">Unassigned</span>'}</td>
      <td><span class="badge ${badge}">${s.status}</span></td>
      <td><div style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="abtn" onclick="openEditSample('${s.rowId}')">&#9998; Edit</button>
        <button class="abtn assign" onclick="openAssign('${s.rowId}')">&#128197; Assign</button>
        <button class="abtn" onclick="deleteSample('${s.rowId}')" style="color:#993C1D;border-color:#F0997B">&#x2715;</button>
      </div></td>
    </tr>`;
  }).join('');
}

// ── REGISTRY MODALS ────────────────────────────────────────────────────────
function staffOpts(selected=''){
  return `<option value="">Unassigned</option>`+staff.map(s=>`<option value="${s.name}"${s.name===selected?' selected':''}>${s.name} — ${s.role}</option>`).join('');
}

function sampleForm(s={}){
  return `
    <div class="shd2">Sample information</div>
    <div class="fg">
      <div class="field"><label>Sample ID *</label><input id="f-id" value="${s.id||''}" placeholder="e.g. ABL-2026-001"></div>
      <div class="field"><label>Priority</label><select id="f-priority"><option${(s.priority||'Normal')==='Normal'?' selected':''}>Normal</option><option${s.priority==='Medium'?' selected':''}>Medium</option><option${s.priority==='High'?' selected':''}>High</option></select></div>
      <div class="field"><label>Client *</label>
        <input id="f-client" value="${s.client||''}" placeholder="Type or select client" list="client-list">
        <datalist id="client-list">${[...new Set(samples.filter(x=>x.client).map(x=>x.client))].map(c=>`<option value="${c}">`).join('')}</datalist>
      </div>
      <div class="field"><label>Test type</label><input id="f-test" value="${s.testType||''}" placeholder="e.g. PCR, Microbiology, Water test…"></div>
      <div class="field"><label>Matrix / Sample type</label>
        <select id="f-matrix">
          ${['','Microbiology','DNA / PCR','Water testing','Food testing','Environmental','Medical Device','VET','Blood','Urine','Soil','Air','Other'].map(m=>`<option value="${m}"${(s.matrix||'')=== m?' selected':''}>${m||'— Select matrix —'}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Quantity</label><input id="f-qty" value="${s.quantity||''}" placeholder="e.g. 3 bottles"></div>
    </div>
    <div class="shd2">Dates</div>
    <div class="fg">
      <div class="field"><label>Reception date</label><input type="date" id="f-reception" value="${s.receptionDate||''}"></div>
      <div class="field"><label>Test start date</label><input type="date" id="f-teststart" value="${s.testStartDate||''}"></div>
      <div class="field"><label>Test end date</label><input type="date" id="f-testend" value="${s.testEndDate||''}"></div>
      <div class="field"><label>Report sent date</label><input type="date" id="f-report" value="${s.reportSentDate||''}"></div>
    </div>
    <div class="shd2">Assignment & status</div>
    <div class="fg">
      <div class="field"><label>Assign to technician</label><select id="f-staff">${staffOpts(s.assignedTo)}</select></div>
      <div class="field"><label>Status</label><select id="f-status">${STATUSES.map(st=>`<option${s.status===st?' selected':''}>${st}</option>`).join('')}</select></div>
    </div>
    <div class="fg full"><div class="field"><label>Notes</label><textarea id="f-notes">${s.notes||''}</textarea></div></div>`;
}

function getFormData(){
  return {
    id:document.getElementById('f-id').value.trim(),
    client:document.getElementById('f-client').value.trim(),
    testType:(document.getElementById('f-test').value||'').trim(),
    matrix:document.getElementById('f-matrix').value,
    quantity:document.getElementById('f-qty').value.trim(),
    receptionDate:document.getElementById('f-reception').value,
    testStartDate:document.getElementById('f-teststart').value,
    testEndDate:document.getElementById('f-testend').value,
    reportSentDate:document.getElementById('f-report').value,
    assignedTo:document.getElementById('f-staff').value,
    status:document.getElementById('f-status').value,
    notes:document.getElementById('f-notes').value.trim(),
    priority:document.getElementById('f-priority').value
  };
}

function openAddSample(){
  openModal(`<h3>&#9635; New sample</h3>${sampleForm()}
    <div class="ma"><button class="bc" onclick="closeModal()">Cancel</button><button class="bp" onclick="saveSample(null)">Save sample</button></div>`);
}

function openEditSample(rowId){
  const s=samples.find(x=>x.rowId===rowId);if(!s)return;
  openModal(`<h3>&#9998; Edit — ${s.id}</h3>${sampleForm(s)}
    <div class="ma"><button class="bd" onclick="deleteSample('${rowId}')">Delete</button><button class="bc" onclick="closeModal()">Cancel</button><button class="bp" onclick="saveSample('${rowId}')">Save</button></div>`);
}

function openAssign(rowId){
  const s=samples.find(x=>x.rowId===rowId);if(!s)return;
  openModal(`<h3>&#128197; Assign to calendar — ${s.id}</h3>
    <div style="background:#f5f4f0;border-radius:8px;padding:10px 12px;margin-bottom:1rem;font-size:13px">
      <strong>${s.client}</strong> · ${s.testType}${s.matrix?' · '+s.matrix:''}
    </div>
    <div class="fg">
      <div class="field"><label>Technician</label><select id="a-staff">${staffOpts(s.assignedTo)}</select></div>
      <div class="field"><label>Task label</label><input id="a-label" value="${s.testType} — ${s.client}"></div>
    </div>
    <div class="fg">
      <div class="field"><label>Date</label><input type="date" id="a-date" value="${s.testStartDate||''}"></div>
      <div class="field"><label>Recurring</label><select id="a-rec"><option value="none">One-time only</option><option value="daily">Every day</option><option value="Mon,Tue,Wed,Thu,Fri">Weekdays</option></select></div>
    </div>
    <div class="fg">
      <div class="field"><label>Start time</label><input id="a-start" value="08h00"></div>
      <div class="field"><label>End time</label><input id="a-end" value="10h00"></div>
    </div>
    <div class="ma"><button class="bc" onclick="closeModal()">Cancel</button><button class="bp" onclick="assignToCalendar('${rowId}')">&#128197; Add to calendar</button></div>`);
}

function assignToCalendar(rowId){
  const s=samples.find(x=>x.rowId===rowId);if(!s)return;
  const staffName=document.getElementById('a-staff').value;
  const label=document.getElementById('a-label').value.trim();
  const dateVal=document.getElementById('a-date').value;
  const rec=document.getElementById('a-rec').value;
  const sm=parseT(document.getElementById('a-start').value);
  const em=parseT(document.getElementById('a-end').value);
  if(!staffName){alert('Please select a technician.');return;}
  if(!label){alert('Please enter a task label.');return;}
  if(!dateVal&&rec==='none'){alert('Please select a date.');return;}
  if(sm===null||em===null||em<=sm){alert('Enter valid start and end times.');return;}
  const staffMember=staff.find(x=>x.name===staffName);
  if(!staffMember){alert('Staff member not found.');return;}
  if(rec==='none'){
    setT(staffMember.id,dateVal,[...getT(staffMember.id,dateVal),{id:'t'+nextTid++,label,sm,em}]);
  } else {
    recurStore.push({id:'r'+nextRid++,sid:staffMember.id,label,sm,em,days:rec});
  }
  s.assignedTo=staffName;
  closeModal();renderCal();renderReg();
  alert(`✅ Task "${label}" added to ${staffName}'s calendar.\n\nSwitch to the Staff Calendar tab to see it.`);
}

async function saveSample(rowId){
  const data=getFormData();
  if(!data.id){alert('Please enter a Sample ID.');return;}
  if(!data.client){alert('Please enter a client name.');return;}
  if(rowId){const s=samples.find(x=>x.rowId===rowId);if(s)Object.assign(s,data);}
  else{samples.push({...data,rowId:'s'+Date.now()});}
  markUnsaved();closeModal();renderReg();
}

async function deleteSample(rowId){
  if(!confirm('Delete this sample?'))return;
  samples=samples.filter(s=>s.rowId!==rowId);
  markUnsaved();closeModal();renderReg();
}

// ── INIT ───────────────────────────────────────────────────────────────────
renderCal();
loadAll();
</script>
</body>
</html>
